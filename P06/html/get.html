<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Menu</title>
</head>
<body>
    <h1>DNA Server Control</h1>

    <section>
        <h3>Access to the server</h3>
        <p>Is the server alive?</p>
        <a href="/ping"><button type="button">PING</button></a>
    </section>

    <br><hr><br>

    <section>
        <h3>Generate DNA Sequence</h3>
        <form action="/get" method="get">
            <label for="num-select">Select sequence index (0-4):</label>
            <select name="num" id="num-select">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
            <button type="submit">GET</button>
        </form>
    </section>

</body>
</html>
