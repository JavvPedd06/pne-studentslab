<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genomics Server</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        section { margin-bottom: 20px; }
        h3 { color: #34495e; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .op-button { padding: 8px 12px; margin-right: 5px; cursor: pointer; background-color: #f8f9fa; border: 1px solid #ccc; border-radius: 4px; }
        .op-button:hover { background-color: #e2e6ea; }
    </style>
</head>
<body>

    <h1>Genomics Server</h1>

    <section>
        <h3>System Status</h3>
        <a href="/ping"><button type="button">Ping Server</button></a>
    </section>

    <br><hr><br>

    <section>
        <h3>Sequence Generator</h3>
        <form action="/get" method="get">
            <label>Select sequence index:</label>
            <select name="num">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
            <button type="submit">Get Sequence</button>
        </form>
    </section>

    <br><hr><br>

    <section>
        <h3>Gene Database Search</h3>
        <form action="/gene" method="get">
            <select name="name">
                <option value="U5">U5</option>
                <option value="ADA">ADA</option>
                <option value="FRAT1">FRAT1</option>
                <option value="FXN">FXN</option>
                <option value="RNU6_269P">RNU6_269P</option>
            </select>
            <button type="submit">View Gene</button>
        </form>
    </section>

    <br><hr><br>

    <section>
        <h3>DNA Operations</h3>
        <form action="/operation" method="get">
            <label>Input DNA Sequence:</label><br>
            <input type="text" name="seq" placeholder="e.g. ATGC" required style="width: 300px; margin-bottom: 10px;"><br>

            <button type="submit" name="op" value="info" class="op-button">Info</button>
            <button type="submit" name="op" value="complement" class="op-button">Complement</button>
            <button type="submit" name="op" value="reverse" class="op-button">Reverse</button>
        </form>
    </section>

</body>
</html>
